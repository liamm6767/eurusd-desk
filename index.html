<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C0F16">
<title>THE DESK</title>
<style>
  :root {
    --ground:#F6F5F1; --panel:#FFFFFF; --panel-2:#F0EFEA; --line:#E2E0D8; --line-strong:#CFCCC1;
    --ink:#16181F; --ink-soft:#55596A; --ink-faint:#8B8F9E;
    --bull:#1F9D57; --bull-bg:#1F9D5718; --bear:#D93A34; --bear-bg:#D93A3418;
    --neutral:#B9822A; --neutral-bg:#B9822A18; --guard:#D42E2E;
    --accent:#4C6BF5; --accent-soft:#4C6BF518;
    --shadow:0 1px 2px rgba(20,24,40,.04),0 8px 24px rgba(20,24,40,.06);
    --radius:14px;
    --mono:ui-monospace,"SF Mono","SFMono-Regular","Menlo","Cascadia Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --ground:#0C0F16; --panel:#141A26; --panel-2:#1B2231; --line:#232B3B; --line-strong:#313B50;
    --ink:#E7EAF2; --ink-soft:#9AA1B4; --ink-faint:#666E82;
    --bull:#2FBF71; --bull-bg:#2FBF7118; --bear:#F0544F; --bear-bg:#F0544F18;
    --neutral:#E0A83E; --neutral-bg:#E0A83E18; --guard:#FF4D4D;
    --accent:#6C8CFF; --accent-soft:#6C8CFF1F;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 12px 30px rgba(0,0,0,.35);
  }}
  :root[data-theme="light"]{
    --ground:#F6F5F1; --panel:#FFFFFF; --panel-2:#F0EFEA; --line:#E2E0D8; --line-strong:#CFCCC1;
    --ink:#16181F; --ink-soft:#55596A; --ink-faint:#8B8F9E;
    --bull:#1F9D57; --bull-bg:#1F9D5718; --bear:#D93A34; --bear-bg:#D93A3418;
    --neutral:#B9822A; --neutral-bg:#B9822A18; --guard:#D42E2E;
    --accent:#4C6BF5; --accent-soft:#4C6BF518;
    --shadow:0 1px 2px rgba(20,24,40,.04),0 8px 24px rgba(20,24,40,.06);
  }
  :root[data-theme="dark"]{
    --ground:#0C0F16; --panel:#141A26; --panel-2:#1B2231; --line:#232B3B; --line-strong:#313B50;
    --ink:#E7EAF2; --ink-soft:#9AA1B4; --ink-faint:#666E82;
    --bull:#2FBF71; --bull-bg:#2FBF7118; --bear:#F0544F; --bear-bg:#F0544F18;
    --neutral:#E0A83E; --neutral-bg:#E0A83E18; --guard:#FF4D4D;
    --accent:#6C8CFF; --accent-soft:#6C8CFF1F;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 12px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--ground);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  .wrap{max-width:1160px;margin:0 auto;padding:16px 16px 72px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:6px 2px 18px}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand b{font-size:19px;font-weight:800;letter-spacing:.16em}
  .brand .tag{font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:var(--ink-faint)}
  .topright{display:flex;align-items:center;gap:12px}
  .clock{text-align:right}
  .clock .t{font-size:17px;font-weight:600}
  .clock .z{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
  .toggle{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-strong);background:var(--panel);
    color:var(--ink-soft);border-radius:999px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:var(--sans)}
  .toggle:hover{border-color:var(--accent);color:var(--accent)}
  .toggle:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .sessions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .sess{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;box-shadow:var(--shadow)}
  .sess .row1{display:flex;align-items:center;justify-content:space-between}
  .sess .city{font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .dot.on{background:var(--bull);box-shadow:0 0 0 3px var(--bull-bg)}
  .dot.off{background:var(--ink-faint)}
  .sess .state{font-size:12.5px;font-weight:600;margin-top:7px}
  .sess .state.open{color:var(--bull)} .sess .state.closed{color:var(--ink-faint)}
  .sess .cd{font-size:11.5px;color:var(--ink-soft);margin-top:1px}

  .guard{border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;
    border:1px solid var(--line);background:var(--panel-2)}
  .guard .icon{font-size:16px}
  .guard .txt b{font-size:13.5px} .guard .txt span{font-size:12.5px;color:var(--ink-soft)}
  .guard.hot{border-color:var(--guard);background:color-mix(in srgb,var(--guard) 12%,var(--panel));
    animation:pulseGuard 1.6s ease-in-out infinite}
  .guard.hot .icon,.guard.hot b{color:var(--guard)}
  @keyframes pulseGuard{0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--guard) 40%,transparent)}50%{box-shadow:0 0 0 5px transparent}}
  @media (prefers-reduced-motion:reduce){.guard.hot{animation:none}}

  .grid{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;align-items:start}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card.hero{border-color:var(--line-strong)}
  .pad{padding:18px 20px}
  .cardhead{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--line)}
  .inst{display:flex;align-items:baseline;gap:10px;min-width:0}
  .inst .sym{font-size:20px;font-weight:800;letter-spacing:.02em}
  .inst .full{font-size:12px;color:var(--ink-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .pill{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .pill.bear{color:var(--bear);background:var(--bear-bg)} .pill.bull{color:var(--bull);background:var(--bull-bg)}
  .pill.neutral{color:var(--neutral);background:var(--neutral-bg)} .pill.parked{color:var(--ink-faint);background:var(--panel-2)}

  .priceRow{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .bigprice{font-size:38px;font-weight:700;letter-spacing:-.01em;line-height:1}
  .verdict{text-align:right}
  .verdict .v{font-size:15px;font-weight:800;letter-spacing:.02em}
  .verdict .v.notrade{color:var(--neutral)} .verdict .v.setup{color:var(--bull)}
  .verdict .sub{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.07em}

  .conf{margin-top:14px}
  .conf .lab{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
  .conf .lab b{color:var(--ink);font-weight:700}
  .conf .track{height:7px;border-radius:4px;background:var(--panel-2);overflow:hidden}
  .conf .fill{height:100%;border-radius:4px}
  .conf .why{font-size:11.5px;color:var(--ink-faint);margin-top:5px}

  .metarow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{font-size:12px;color:var(--ink-soft);background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:5px 9px}
  .chip b{color:var(--ink);font-weight:600}

  .analysis{font-size:13px;color:var(--ink-soft);margin-top:14px;padding:12px 14px;background:var(--panel-2);border-radius:10px;border:1px solid var(--line)}
  .analysis .h{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:6px}
  .watch{font-size:12.5px;margin-top:10px;padding:10px 12px;border-radius:9px;border:1px dashed var(--line-strong);color:var(--ink)}
  .watch b{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);display:block;margin-bottom:3px;font-weight:700}
  .watch.live{border-style:solid;border-color:var(--bull);background:var(--bull-bg)}

  .section-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin:20px 0 10px}
  .gate{display:grid;gap:8px}
  .gate .item{display:flex;align-items:center;gap:10px;font-size:13.5px}
  .gate .mark{width:18px;height:18px;border-radius:6px;display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  .gate .mark.yes{color:var(--bull);background:var(--bull-bg)} .gate .mark.no{color:var(--bear);background:var(--bear-bg)}
  .gate .item .note{color:var(--ink-faint);font-size:12px;margin-left:auto;text-align:right}

  .plan{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .plan .cell{background:var(--panel);padding:10px 12px}
  .plan .cell .k{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint)}
  .plan .cell .val{font-size:15px;font-weight:600;margin-top:3px}
  .plan .cell .val.bear{color:var(--bear)} .plan .cell .val.bull{color:var(--bull)}

  .ladder{display:grid;gap:6px}
  .lvl{display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:12px;font-size:13px}
  .lvl .name{color:var(--ink-soft);text-transform:capitalize}
  .lvl .bar{height:6px;border-radius:3px;background:var(--panel-2);position:relative;overflow:hidden}
  .lvl .bar i{position:absolute;inset:0 auto 0 0;background:var(--accent);opacity:.5;border-radius:3px}
  .lvl .d{color:var(--ink-soft);text-align:right}
  .lvl.near .name,.lvl.near .d{color:var(--accent);font-weight:600}

  .desks{display:grid;gap:10px}
  .desk{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start}
  .desk .badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;border-radius:7px;white-space:nowrap;min-width:60px;text-align:center}
  .badge.hold{color:var(--neutral);background:var(--neutral-bg)} .badge.go{color:var(--bull);background:var(--bull-bg)} .badge.idle{color:var(--ink-faint);background:var(--panel-2)}
  .desk .who{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em}
  .desk .read{font-size:12.5px;color:var(--ink-soft)}

  .stack{display:grid;gap:16px}

  /* news + calendar */
  .newsgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
  .newscard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .cal{display:grid;gap:2px}
  .cal .ev{display:grid;grid-template-columns:auto auto 1fr auto;gap:10px;align-items:center;padding:10px 6px;border-top:1px solid var(--line);font-size:12.5px}
  .cal .ev:first-child{border-top:0}
  .ccy{font-size:10.5px;font-weight:800;letter-spacing:.04em;padding:3px 7px;border-radius:6px;background:var(--panel-2);color:var(--ink)}
  .imp{width:7px;height:7px;border-radius:50%}
  .imp.High{background:var(--bear)} .imp.Medium{background:var(--neutral)}
  .cal .ev .ttl{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal .ev .ttl small{color:var(--ink-faint);display:block;font-size:11px}
  .cal .ev .tm{text-align:right;color:var(--ink-soft);white-space:nowrap}
  .cal .ev .tm b{display:block;color:var(--ink);font-weight:600}
  .heads{display:grid;gap:0}
  .head{display:grid;grid-template-columns:auto 1fr;gap:10px;padding:11px 6px;border-top:1px solid var(--line)}
  .head:first-child{border-top:0}
  .head .flag{display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:2px}
  .head .dir{font-size:13px;font-weight:800}
  .dir.up{color:var(--bull)} .dir.down{color:var(--bear)} .dir.flat{color:var(--ink-faint)}
  .head .big{font-size:10px}
  .head a{color:var(--ink);text-decoration:none;font-size:12.5px;line-height:1.4}
  .head a:hover{color:var(--accent)}
  .head .meta{font-size:10.5px;color:var(--ink-faint);margin-top:3px}
  .head .mk{color:var(--accent);font-weight:600}
  .newsnote{font-size:11px;color:var(--ink-faint);padding:0 16px 14px}
  .empty{font-size:12.5px;color:var(--ink-faint);padding:16px 6px}

  .macro-head{display:flex;align-items:center;justify-content:space-between;margin:26px 2px 12px}
  .macro-head h2{font-size:15px;margin:0;font-weight:700}
  .mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .mcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow);display:flex;flex-direction:column}
  .mcard .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .mcard .msym{font-size:14px;font-weight:800;letter-spacing:.02em}
  .mcard .mprice{font-size:20px;font-weight:700;margin:8px 0 2px}
  .mcard .conf{margin-top:6px}
  .mcard .manalysis{font-size:11.5px;color:var(--ink-soft);margin-top:9px}
  .mcard .mwatch{font-size:11px;color:var(--ink-faint);margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}

  .gauges{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .gauge{background:var(--panel);padding:12px 14px}
  .gauge .g-name{font-size:11px;color:var(--ink-faint)} .gauge .g-val{font-size:19px;font-weight:600;margin-top:4px}
  .gauge .g-chg{font-size:12px;margin-top:2px;font-weight:600} .g-chg.up{color:var(--bull)} .g-chg.dn{color:var(--bear)}
  .gauge .g-month{font-size:10.5px;color:var(--ink-faint);margin-top:3px}

  .btn{display:inline-block;margin-top:14px;font-size:12px;color:var(--accent);text-decoration:none;border:1px solid var(--line-strong);border-radius:8px;padding:7px 12px}
  .btn:hover{border-color:var(--accent);background:var(--accent-soft)}

  .foot{margin-top:26px;padding-top:14px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-faint);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .foot code{font-family:var(--mono);color:var(--ink-soft)}
  .loading{text-align:center;color:var(--ink-faint);padding:60px 0;font-size:14px}

  @media (max-width:900px){.grid{grid-template-columns:1fr}.mgrid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:560px){.sessions{grid-template-columns:1fr 1fr}.bigprice{font-size:32px}.plan{grid-template-columns:1fr 1fr}.gauges{grid-template-columns:1fr}}
  @media (max-width:400px){.mgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><b>THE&nbsp;DESK</b><span class="tag">EUR/USD · one setup · one rule</span></div>
    <div class="topright">
      <div class="clock"><div class="t mono" id="gstClock">--:--:--</div><div class="z">GST · Dubai</div></div>
      <button class="toggle" id="themeBtn" aria-label="Toggle theme"><span id="themeIcon">☾</span><span id="themeLabel">Dark</span></button>
    </div>
  </div>

  <div class="sessions" id="sessions"></div>

  <div class="guard" id="guard">
    <span class="icon" id="guardIcon">🛡️</span>
    <div class="txt"><b id="guardTitle">16:30 GST news guard</b><br><span id="guardMsg">Checking the clock…</span></div>
  </div>

  <div id="app"><div class="loading">Loading the desk…</div></div>

  <div class="foot">
    <span id="footStamp">—</span>
    <span>Clocks &amp; guard live · prices are the last saved reading · informs, doesn't execute · not financial advice</span>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- live clocks + guard (pure time math, always live) --------- */
  var SESS=[{city:"Sydney",open:21,close:6},{city:"Tokyo",open:0,close:9},{city:"London",open:7,close:16},{city:"New York",open:12,close:21}];
  var sessEl=document.getElementById("sessions");
  SESS.forEach(function(s,i){var el=document.createElement("div");el.className="sess";el.id="sess"+i;
    el.innerHTML='<div class="row1"><span class="city">'+s.city+'</span><span class="dot off"></span></div><div class="state closed">—</div><div class="cd">—</div>';
    sessEl.appendChild(el);});
  function inWin(h,o,c){return o<c?(h>=o&&h<c):(h>=o||h<c);}
  function hUntil(t,now){var d=new Date(now);d.setUTCMinutes(0,0,0);d.setUTCHours(t);if(d<=now)d.setUTCDate(d.getUTCDate()+1);return (d-now)/3600000;}
  function fmtDur(hf){var m=Math.max(0,Math.round(hf*60)),h=Math.floor(m/60),mm=m%60;return (h>0?h+"h ":"")+mm+"m";}
  var guardEl=document.getElementById("guard"),guardMsg=document.getElementById("guardMsg"),guardIcon=document.getElementById("guardIcon"),guardTitle=document.getElementById("guardTitle");
  function tick(){
    var now=new Date();
    var gst=new Date(now.getTime()+4*3600000);
    document.getElementById("gstClock").textContent=String(gst.getUTCHours()).padStart(2,"0")+":"+String(gst.getUTCMinutes()).padStart(2,"0")+":"+String(gst.getUTCSeconds()).padStart(2,"0");
    var uh=now.getUTCHours()+now.getUTCMinutes()/60;
    SESS.forEach(function(s,i){var el=document.getElementById("sess"+i);var dot=el.querySelector(".dot"),st=el.querySelector(".state"),cd=el.querySelector(".cd");
      if(inWin(uh,s.open,s.close)){dot.className="dot on";st.className="state open";st.textContent="Open";cd.textContent="closes in "+fmtDur(hUntil(s.close,now));}
      else{dot.className="dot off";st.className="state closed";st.textContent="Closed";cd.textContent="opens in "+fmtDur(hUntil(s.open,now));}});
    var target=new Date(now);target.setUTCHours(12,30,0,0);if(target<=now)target.setUTCDate(target.getUTCDate()+1);
    var mins=(target-now)/60000;
    if(mins<=60){guardEl.className="guard hot";guardIcon.textContent="⛔";guardTitle.textContent="16:30 GST news guard — STAND DOWN";guardMsg.textContent="US data drop in "+fmtDur(mins/60)+". No new EUR/USD trades into it.";}
    else{guardEl.className="guard";guardIcon.textContent="🛡️";guardTitle.textContent="16:30 GST news guard";guardMsg.textContent="Clear — next US data drop in "+fmtDur(mins/60)+". Guard arms 60 min before.";}
  }
  tick();setInterval(tick,1000);

  /* ---------------- theme ---------------- */
  var root=document.documentElement,btn=document.getElementById("themeBtn"),icon=document.getElementById("themeIcon"),label=document.getElementById("themeLabel");
  function prefersDark(){return window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;}
  function applyTheme(m){root.setAttribute("data-theme",m);var d=m==="dark";icon.textContent=d?"☀":"☾";label.textContent=d?"Light":"Dark";
    var mt=document.querySelector('meta[name=theme-color]');if(mt)mt.setAttribute("content",d?"#0C0F16":"#F6F5F1");}
  applyTheme(prefersDark()?"dark":"light");
  btn.addEventListener("click",function(){applyTheme(root.getAttribute("data-theme")==="dark"?"light":"dark");});

  /* ---------------- helpers ---------------- */
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function biasClass(b){return b==="Bullish"?"bull":b==="Bearish"?"bear":"neutral";}
  function biasColor(b){return b==="Bullish"?"var(--bull)":b==="Bearish"?"var(--bear)":"var(--neutral)";}
  function num(x){return x==null?"—":x;}
  function cap(s){return s?s.charAt(0)+s.slice(1).toLowerCase():s;}
  function shortName(n){return n.replace(" · XAU/USD","").replace("US Oil · WTI","US Oil (WTI)");}
  function trim(s,n){s=s||"";return s.length>n?s.slice(0,n-1).trim()+"…":s;}

  function confBlock(s){
    return '<div class="conf"><div class="lab"><span>Conviction</span><b>'+s.confidence+'%</b></div>'+
      '<div class="track"><div class="fill" style="width:'+s.confidence+'%;background:'+biasColor(s.bias)+'"></div></div>'+
      '<div class="why">'+esc(s.confidence_why||"")+'</div></div>';
  }

  function renderHero(s){
    var U=s.unit, g=s.gate||{};
    var gateItems=[
      {ok:g.trigger,lbl:"A clean trigger at a level",note:s.nearest?(s.nearest.name.replace(/_/g," ")+" "+Math.abs(s.nearest.dist_pips)+" "+U):""},
      {ok:g.direction_aligned,lbl:"Aligned with the daily trend",note:(s.daily&&s.h1)?("D1 "+s.daily.trend.toLowerCase()+" / H1 "+s.h1.trend.toLowerCase()):""},
      {ok:g.regime_ok,lbl:"Regime is running, not choppy",note:s.regime?s.regime.toLowerCase():""}
    ];
    var gateHtml=gateItems.map(function(i){return '<div class="item"><span class="mark '+(i.ok?"yes":"no")+'">'+(i.ok?"✓":"✕")+'</span><span class="lbl">'+esc(i.lbl)+'</span><span class="note">'+esc(i.note)+'</span></div>';}).join("");

    var lo=s.box[0],hi=s.box[1];
    var ladder=(s.levels||[]).map(function(l){
      var pos=Math.max(0,Math.min(1,(l.price-lo)/(hi-lo)));
      var near=s.nearest&&s.nearest.name===l.name;
      return '<div class="lvl'+(near?" near":"")+'"><span class="name">'+esc(l.name.replace(/_/g," "))+' · <span class="mono">'+l.price+'</span></span><span class="bar"><i style="width:'+Math.round(pos*100)+'%"></i></span><span class="d mono">'+l.dist_pips+' '+U+'</span></div>';
    }).join("");

    var order=["chartist","quant","risk","trade"],names={chartist:"Chartist",quant:"Quant",risk:"Risk",trade:"Trade"};
    var desks=order.map(function(k){var d=(s.desks||{})[k];if(!d)return "";return '<div class="desk"><span class="badge '+d.status+'">'+d.status+'</span><div><div class="who">'+names[k]+'</div><div class="read">'+esc(d.read)+'</div></div></div>';}).join("");

    var plan=(s.setup&&s.setup.plan)?s.setup.plan:null;
    var planHtml=plan?(
      '<div class="section-label">Setup live — the plan ('+esc(plan.dir)+')</div><div class="plan">'+
      '<div class="cell"><div class="k">Entry</div><div class="val mono">'+plan.entry+'</div></div>'+
      '<div class="cell"><div class="k">Stop</div><div class="val mono bear">'+plan.stop+'</div></div>'+
      '<div class="cell"><div class="k">Target 1</div><div class="val mono bull">'+plan.target1+'</div></div>'+
      '<div class="cell"><div class="k">Risk / R:R</div><div class="val mono">'+plan.risk_pips+' · '+plan.rr+'R</div></div></div>'+
      '<p style="font-size:12.5px;color:var(--ink-faint);margin:8px 2px 0">Then '+esc(plan.then)+'.</p>'
    ):(s.setup&&s.setup.waiting?'<p style="font-size:12.5px;color:var(--ink-faint);margin:14px 2px 0">'+esc(s.setup.waiting)+'</p>':'');

    var setupTrade=!!(s.gate&&s.gate.open);
    return '<div class="card hero"><div class="cardhead"><div class="inst"><span class="sym">'+esc(s.name)+'</span><span class="full">the one setup · daily triple-EMA pullback</span></div><span class="pill '+biasClass(s.bias)+'">'+esc(s.bias)+'</span></div><div class="pad">'+
      '<div class="priceRow"><div><div class="bigprice mono">'+s.price+'</div>'+
        '<div class="metarow"><span class="chip">Regime <b>'+esc(cap(s.regime))+'</b></span><span class="chip">Box <b class="mono">'+Math.round(s.box_pos*100)+'%</b></span>'+
        '<span class="chip">D1 RSI <b class="mono">'+num(s.daily&&s.daily.rsi)+'</b></span><span class="chip">H1 RSI <b class="mono">'+num(s.h1&&s.h1.rsi)+'</b></span></div></div>'+
        '<div class="verdict"><div class="v '+(setupTrade?"setup":"notrade")+'">'+esc(s.verdict.split(" — ")[0])+'</div><div class="sub">'+(setupTrade?"gate open":"patience · gate closed")+'</div></div></div>'+
      confBlock(s)+
      '<div class="analysis"><div class="h">◆ AI analysis</div>'+esc(s.analysis)+'</div>'+
      '<div class="watch'+(setupTrade?" live":"")+'"><b>Trade to watch</b>'+esc(s.watch)+'</div>'+
      '<div class="section-label">The gate — 3 checks, all must be green</div><div class="gate">'+gateHtml+'</div>'+
      planHtml+
      '<div class="section-label">Levels — the marked box</div><div class="ladder">'+ladder+'</div>'+
      '<div class="section-label">Desk reads</div><div class="desks">'+desks+'</div>'+
      '<a class="btn" href="https://www.tradingview.com/symbols/EURUSD/" target="_blank" rel="noopener">Open live chart on TradingView ↗</a>'+
      '</div></div>';
  }

  function renderMacroCard(s){
    return '<div class="mcard"><div class="top"><span class="msym">'+esc(shortName(s.name))+'</span><span class="pill '+biasClass(s.bias)+'">'+esc(s.bias)+'</span></div>'+
      '<div class="mprice mono">'+s.price+'</div>'+
      confBlock(s)+
      '<div class="manalysis">'+esc(trim(s.analysis,150))+'</div>'+
      '<div class="mwatch">'+esc(s.watch)+'</div></div>';
  }

  function renderGauges(ctx){
    if(!ctx||!ctx.gauges)return "";
    var cells=["dxy","ust10","oil","vix"].map(function(k){var gg=ctx.gauges[k];if(!gg||gg.error)return "";
      var up=(gg.chg_pct||0)>=0;
      return '<div class="gauge"><div class="g-name">'+esc(gg.name)+'</div><div class="g-val mono">'+gg.value+(gg.unit||"")+'</div>'+
        '<div class="g-chg '+(up?"up":"dn")+' mono">'+(up?"+":"")+gg.chg_pct+'%</div>'+
        '<div class="g-month">month: '+(gg.month_dir==="up"?"rising ↑":"falling ↓")+'</div></div>';
    }).join("");
    return '<div class="card"><div class="cardhead"><div class="inst"><span class="sym" style="font-size:15px">Macro backdrop</span></div><span class="eyebrow">the dollar\'s weather</span></div><div class="pad"><div class="gauges">'+cells+'</div>'+
      '<p style="font-size:12px;color:var(--ink-faint);margin:12px 2px 0">DXY is EUR/USD\'s mirror — dollar up, euro down. Soft VIX = calm tape, small ranges.</p></div></div>';
  }

  function relAge(pub){
    var t=Date.parse(pub); if(isNaN(t))return "";
    var m=Math.round((Date.now()-t)/60000);
    if(m<60)return m+"m ago"; var h=Math.round(m/60); if(h<24)return h+"h ago";
    return Math.round(h/24)+"d ago";
  }
  function fmtMins(m){var a=Math.abs(m);if(a<60)return (m<0?"":"")+a+"m";var h=Math.floor(a/60),mm=a%60;return h+"h"+(mm?" "+mm+"m":"");}
  function renderNews(news){
    if(!news)return "";
    var cal=news.calendar||[], heads=news.headlines||[];
    var calHtml=cal.length?cal.map(function(e){
      var when=e.mins_to<0?"was "+fmtMins(e.mins_to)+" ago":"in "+fmtMins(e.mins_to);
      var fp=e.forecast?('<small>fc '+esc(e.forecast)+' · prev '+esc(e.previous)+'</small>'):'';
      return '<div class="ev"><span class="ccy">'+esc(e.ccy)+'</span><span class="imp '+esc(e.impact)+'"></span>'+
        '<span class="ttl">'+esc(e.title)+fp+'</span><span class="tm"><b>'+esc(e.when_gst)+'</b>'+when+'</span></div>';
    }).join(""):'<div class="empty">No high-impact events left on the calendar this week. Quiet diary — the guard still watches 16:30 daily.</div>';

    var headHtml=heads.length?heads.map(function(h){
      var arrow=h.direction==="up"?"↑":h.direction==="down"?"↓":"·";
      var big=h.strength==="big"?'<span class="big">🔥</span>':'';
      var link=h.link?('<a href="'+esc(h.link)+'" target="_blank" rel="noopener">'+esc(h.title)+'</a>'):('<span>'+esc(h.title)+'</span>');
      return '<div class="head"><div class="flag"><span class="dir '+esc(h.direction)+'">'+arrow+'</span>'+big+'</div>'+
        '<div>'+link+'<div class="meta"><span class="mk">'+esc(h.market)+'</span> · '+esc(relAge(h.pub))+'</div></div></div>';
    }).join(""):'<div class="empty">Headlines feed is quiet right now.</div>';

    return '<div class="newsgrid">'+
      '<div class="newscard"><div class="cardhead"><div class="inst"><span class="sym" style="font-size:15px">Next high-impact events</span></div><span class="eyebrow">the diary · GST</span></div><div class="pad"><div class="cal">'+calHtml+'</div></div></div>'+
      '<div class="newscard"><div class="cardhead"><div class="inst"><span class="sym" style="font-size:15px">Latest headlines</span></div><span class="eyebrow">auto-tagged · sanity-check</span></div><div class="pad" style="padding-top:6px"><div class="heads">'+headHtml+'</div></div><div class="newsnote">↑/↓ and 🔥 are a rough keyword auto-tag, not a real read — glance, don\'t trade off them. '+esc(news.sources||"")+'</div></div>'+
      '</div>';
  }

  function render(data){
    var app=document.getElementById("app");
    var inst=data.instruments||{}, order=data.order||Object.keys(inst);
    var hero=inst.eurusd;
    var macros=order.filter(function(k){return k!=="eurusd"&&inst[k];}).map(function(k){return inst[k];});

    var html='<div class="grid"><div>'+(hero?renderHero(hero):'')+'</div><div class="stack">'+renderGauges(data.context)+
      '<div class="card"><div class="cardhead"><div class="inst"><span class="sym" style="font-size:15px">Why EUR/USD only</span></div></div><div class="pad"><p style="font-size:12.5px;color:var(--ink-soft);margin:0">One setup, one instrument, one rule. The eight markets below are your <b>macro read</b> — bias, conviction and analysis so you know the weather. They are <b>not</b> trade instruments for you. Discipline is the edge.</p></div></div>'+
      '</div></div>';

    html+=renderNews(data.news);

    html+='<div class="macro-head"><h2>Macro desk — '+macros.length+' markets</h2><span class="eyebrow">read-only · bias &amp; analysis</span></div>';
    html+='<div class="mgrid">'+macros.map(renderMacroCard).join("")+'</div>';

    app.innerHTML=html;
    var f=document.getElementById("footStamp");
    if(f)f.innerHTML='Snapshot from the board — <code>'+esc(data.updated_full||"")+'</code>';
  }

  function load(){
    fetch('states.json?t='+Date.now(),{cache:'no-store'})
      .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
      .then(render)
      .catch(function(e){
        document.getElementById("app").innerHTML='<div class="loading">Waiting for the board to publish… ('+esc(e.message)+')<br><span style="font-size:12px">The engine refreshes on its timer — check back in a minute.</span></div>';
      });
  }
  load();
  setInterval(load,60000);
})();
</script>
</body>
</html>
